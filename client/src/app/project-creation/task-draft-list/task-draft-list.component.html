@if (!tasks || tasks.length === 0) {
	<div>
		<span>{{ 'project-creation.no-task-yet-notice' | translate }}</span>
	</div>
} @for (t of tasks; track t) {
	<div class="list-item"
		 [class.list-item-selected]="t.id === selectedTask?.id"
		 (click)="onTaskClicked(t.id)">
		<div>
			{{ t.name }}
		</div>
	</div>
}
